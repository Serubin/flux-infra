apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 5m
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: velero-charts
        namespace: default
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    initContainers:
      - name: velero-plugin-for-aws
        # Pinned to v1.14.0: v1.14.1's aws-sdk-go-v2 emits an x-amz-tagging header
        # that Backblaze B2 rejects (HTTP 400 InvalidArgument), failing every backup
        # at the velero-backup.json upload. Renovate is capped at <=1.14.0
        # (.github/renovate.json) until upstream releases the conditional-Tagging
        # fix (velero-plugin-for-aws commit 8dbd6b8).
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    deployNodeAgent: true
    nodeAgent:
      podVolumePath: /var/lib/kubelet/pods
    credentials:
      useSecret: true
      existingSecret: velero-b2-credentials
    backupsEnabled: true
    snapshotsEnabled: false
    configuration:
      backupSyncPeriod: 60m
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${VELERO_B2_BUCKET}
          prefix: velero-backups
          default: true
          accessMode: ReadWrite
          credential:
            name: velero-b2-credentials
            key: cloud
          config:
            region: us-east-1
            s3ForcePathStyle: "true"
            s3Url: ${VELERO_B2_ENDPOINT}
    schedules:
      hourly-backup:
        schedule: "0 * * * *"
        template:
          ttl: 12h0m0s
          storageLocation: default
          defaultVolumesToFsBackup: true
      daily-backup:
        schedule: "0 2 * * *"
        template:
          ttl: 168h0m0s
          storageLocation: default
          defaultVolumesToFsBackup: true
      weekly-backup:
        schedule: "0 3 * * 0"
        template:
          ttl: 1680h0m0s
          storageLocation: default
          defaultVolumesToFsBackup: true
