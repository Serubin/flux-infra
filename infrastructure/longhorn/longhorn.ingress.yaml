apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: longhorn-stripprefix
  namespace: longhorn-system
spec:
  stripPrefix:
    prefixes:
      - /longhorn
---
# Normalize /longhorn -> /longhorn/ so stripPrefix doesn't strip the request
# down to an empty path (which renders as a blank page in the Longhorn UI).
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: longhorn-redirect-slash
  namespace: longhorn-system
spec:
  redirectRegex:
    regex: ^(https?://[^/]+)/longhorn$
    replacement: ${1}/longhorn/
    permanent: true
---
# Local copy of forwardauth-authentik. Traefik isn't started with
# allowCrossNamespace=true, so IngressRoutes can only reference middlewares
# in their own namespace.
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: forwardauth-authentik
  namespace: longhorn-system
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/name: authentik
spec:
  forwardAuth:
    address: http://authentik-server.default.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-entitlements
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ui
  namespace: longhorn-system
spec:
  routes:
    - match: Host(`ops.${SECRET_DOMAIN}`) && PathPrefix(`/longhorn`)
      kind: Rule
      services:
        - name: longhorn-frontend
          port: 80
      middlewares:
        - name: longhorn-redirect-slash
        - name: forwardauth-authentik
        - name: longhorn-stripprefix
