apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-blueprint
  namespace: default
data:
  ops.yaml: |
    version: 1
    metadata:
      name: ops-forward-auth
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: ops-provider
        identifiers:
          name: ops-forward-auth
        attrs:
          name: Ops Forward Auth Provider
          external_host: https://ops.${SECRET_DOMAIN}
          # internal_host is unused in forward_single mode but required by the serializer.
          internal_host: http://localhost
          internal_host_ssl_validation: false
          mode: forward_single
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        id: ops-app
        identifiers:
          slug: ops
        attrs:
          name: Ops Dashboard
          slug: ops
          provider: !KeyOf ops-provider
          # blank://blank hides the tile from the user library while keeping
          # the forward-auth proxy provider for ops.${SECRET_DOMAIN} active.
          meta_launch_url: blank://blank
          meta_description: Auth gate for ops.${SECRET_DOMAIN} (Longhorn, Weave, Traefik)
          open_in_new_tab: true
          group: Ops
          policy_engine_mode: any
      # Tile-only Applications: deep-link launchers in the user library; protection comes from the host-level forward-auth above.
      - model: authentik_core.application
        id: longhorn-app
        identifiers:
          slug: longhorn
        attrs:
          name: Longhorn
          slug: longhorn
          meta_launch_url: https://ops.${SECRET_DOMAIN}/longhorn
          icon: https://longhorn.io/img/logos/longhorn-icon-color.png
          meta_description: Longhorn Storage Management UI
          open_in_new_tab: true
          group: Ops
          policy_engine_mode: any
      - model: authentik_core.application
        id: weave-app
        identifiers:
          slug: weave-gitops
        attrs:
          name: Weave GitOps
          slug: weave-gitops
          meta_launch_url: https://ops.${SECRET_DOMAIN}/weave
          icon: https://raw.githubusercontent.com/weaveworks/weave-gitops/main/website/static/img/logo.svg
          meta_description: Flux GitOps Dashboard
          open_in_new_tab: true
          group: Ops
          policy_engine_mode: any
      - model: authentik_core.application
        id: traefik-app
        identifiers:
          slug: traefik-dashboard
        attrs:
          name: Traefik Dashboard
          slug: traefik-dashboard
          meta_launch_url: https://ops.${SECRET_DOMAIN}/dashboard/
          icon: https://raw.githubusercontent.com/traefik/traefik/master/docs/content/assets/img/traefikproxy-icon-color.png
          meta_description: Traefik Reverse Proxy Dashboard
          open_in_new_tab: true
          group: Ops
          policy_engine_mode: any
      - model: authentik_core.application
        id: capacitor-app
        identifiers:
          slug: capacitor
        attrs:
          name: Capacitor
          slug: capacitor
          meta_launch_url: https://ops.${SECRET_DOMAIN}/capacitor
          icon: https://raw.githubusercontent.com/gimlet-io/capacitor/main/web/public/favicon.ico
          meta_description: Flux GitOps Dashboard
          open_in_new_tab: true
          group: Ops
          policy_engine_mode: any
