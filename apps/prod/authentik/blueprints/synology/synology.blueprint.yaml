apiVersion: v1
kind: ConfigMap
metadata:
  name: synology-blueprint
  namespace: default
data:
  synology.yaml: |
    version: 1
    metadata:
      name: synology-oauth
    entries:
      # OAuth2/OIDC provider for Synology DSM 7.2+ SSO Client.
      # The client_secret is sourced from synology-auth-secrets via the worker
      # envFrom in authentik.hr.yaml, then read here with !Env.
      - model: authentik_providers_oauth2.oauth2provider
        id: synology-provider
        identifiers:
          client_id: synology
        attrs:
          name: Synology OAuth Provider
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: synology
          client_secret: !Env SYNOLOGY_CLIENT_SECRET
          redirect_uris:
            - matching_mode: regex
              url: ^https://nas\.serubin\.me(:\d+)?/.*$
            - matching_mode: regex
              url: ^https://[^.]+\.quickconnect\.to/.*$
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          # The default `profile` scope mapping already emits the `groups`
          # claim in the userinfo response — there is no separate `groups`
          # scope mapping shipped with authentik 2026. Adding one would
          # require a custom ScopeMapping entry; not needed for DSM.
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]

      - model: authentik_core.application
        id: synology-app
        identifiers:
          slug: synology
        attrs:
          name: Synology
          slug: synology
          provider: !KeyOf synology-provider
          meta_launch_url: https://nas.serubin.me/
          icon: https://cdn.jsdelivr.net/gh/selfhst/icons/svg/synology.svg
          meta_description: Synology NAS (DSM)
          group: Apps
          open_in_new_tab: true
          policy_engine_mode: any
