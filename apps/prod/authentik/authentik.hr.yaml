apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: default
spec:
  valuesFrom:
    - kind: Secret
      name: authentik-secrets
      valuesKey: secret_key
      targetPath: authentik.secret_key
      optional: false
    - kind: Secret
      name: authentik-secrets
      valuesKey: password
      targetPath: authentik.postgresql.password
      optional: false
    - kind: Secret
      name: noreply-email-secrets
      valuesKey: NOREPLY_SEND_EMAIL
      targetPath: authentik.email.from
      optional: false
    - kind: Secret
      name: noreply-email-secrets
      valuesKey: NOREPLY_AUTH_EMAIL
      targetPath: authentik.email.username
      optional: false
    - kind: Secret
      name: noreply-email-secrets
      valuesKey: NOREPLY_PASSWORD
      targetPath: authentik.email.password
      optional: false
  values:
    global:
      image:
        repository: ghcr.io/goauthentik/server
        tag: 2026.2.2
      envFrom:
        - secretRef:
            name: grafana-auth-secrets
        - secretRef:
            name: synology-auth-secrets
        - secretRef:
            name: jellyfin-auth-secrets
    authentik:
      email:
        host: smtp.gmail.com
        port: 587
        use_tls: true
    blueprints:
      configMaps:
        - grafana-blueprint
        - ops-blueprint
        - prometheus-blueprint
        - alertmanager-blueprint
        - synology-blueprint
        - media-blueprint
        - jellyfin-blueprint
        - embedded-outpost-blueprint
        - home-outpost-blueprint
        - ops-group-blueprint
        - apps-group-blueprint
        - media-users-group-blueprint
    server:
      ingress:
        hosts:
          - ${OAUTH_URL}
