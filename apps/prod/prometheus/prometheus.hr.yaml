---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 80.9.2
      sourceRef:
        kind: HelmRepository
        name: prometheus-charts
        namespace: default
      interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: grafana-auth-secrets
      valuesKey: GRAFANA_CLIENT_SECRET
      targetPath: grafana.env.GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      optional: false
    - kind: Secret
      name: alertmanager-secrets
      valuesKey: TO_EMAIL
      targetPath: alertmanager.config.receivers[0].email_configs[0].to
      optional: false
  values:
    alertmanager:
      image:
        tag: v0.30.0
      ingress:
        hosts:
          - "alert-manager.${SECRET_DOMAIN}"
      config:
        global:
          resolve_timeout: 5m
          smtp_smarthost: "smtp.gmail.com:587"
          smtp_require_tls: true
          smtp_from: "${NOREPLY_SEND_EMAIL}"
          smtp_auth_username: "${NOREPLY_AUTH_EMAIL}"
          smtp_auth_password: "${NOREPLY_PASSWORD}"
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: email-default
          routes: []
        receivers:
          - name: email-default
            email_configs:
              - send_resolved: true
                headers:
                  Subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}][{{ .CommonLabels.severity | toUpper }}] {{ .GroupLabels.alertname }}'
        inhibit_rules:
          - source_matchers: [severity = "critical"]
            target_matchers: [severity =~ "warning|info"]
            equal: [namespace, alertname]
          - source_matchers: [severity = "warning"]
            target_matchers: [severity = "info"]
            equal: [namespace, alertname]
          - source_matchers: [alertname = "InfoInhibitor"]
            target_matchers: [severity = "info"]
            equal: [namespace]
          - target_matchers: [alertname = "InfoInhibitor"]
    grafana:
      image:
        tag: 12.3.1
      env:
        GF_SERVER_ROOT_URL: https://grafana.${SECRET_DOMAIN}
        GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
        GF_AUTH_GENERIC_OAUTH_NAME: "authentik"
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
        GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
        GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://${OAUTH_URL}/application/o/authorize/"
        GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://${OAUTH_URL}/application/o/token/"
        GF_AUTH_GENERIC_OAUTH_API_URL: "https://${OAUTH_URL}/application/o/userinfo/"
        GF_AUTH_SIGNOUT_REDIRECT_URL: "https://${OAUTH_URL}/application/o/grafana/end-session/"
        # Optionally enable auto-login (bypasses Grafana login screen)
        GF_AUTH_OAUTH_AUTO_LOGIN: "true"
        # Map user groups to Grafana roles
        GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'Ops') && 'Admin' || 'Viewer'"
      ingress:
        hosts:
          - "grafana.${SECRET_DOMAIN}"
    prometheus:
      image:
        tag: v3.8.1
      ingress:
        hosts:
          - "prometheus.${SECRET_DOMAIN}"
