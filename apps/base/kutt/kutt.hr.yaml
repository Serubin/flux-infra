apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kutt
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: kutt
      version: 9.6.13
      sourceRef:
        kind: HelmRepository
        name: christianhuth-helm-chart
        namespace: default
  # The chart hardcodes liveness/readiness probes with no values hook and ships
  # no startupProbe, so the liveness probe starts polling at t=0. Kutt runs
  # `knex migrate:latest` before it listens, so a slow start -- e.g. while the
  # CloudNativePG cluster is restarting -- gets the container killed mid-boot,
  # which compounds into a CrashLoopBackOff. A startupProbe suspends liveness
  # until the app is actually serving.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kutt
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kutt
              spec:
                template:
                  spec:
                    containers:
                      - name: kutt
                        startupProbe:
                          httpGet:
                            path: /api/v2/health
                            port: http
                          periodSeconds: 10
                          failureThreshold: 30
  values:
    image:
      repository: kutt/kutt
      tag: "v3.2.6"
    labels:
      app: kutt
    ingress:
      enabled: true
    kutt:
      admin:
        emails: "${EMAIL}"
      config:
        disallowAnonymousLinks: true
        disallowRegistration: true
      domain:
        useFirstIngressHost: true
      mail:
        host: smtp.gmail.com
        secure: true
    postgresql:
      enabled: false
    externalPostgresql:
      # Using CloudNativePG cluster
      hostname: kutt-postgresql-cnpg-cluster-rw
      port: 5432
      auth:
        database: kutt
        username: kutt
    redis:
      enabled: false
    externalRedis:
      # Cluster must provide
      # auth:
      #   existingSecret (secret key is password)
      #
      hostname: kutt-redis
      port: 6379
      auth:
        enabled: true
