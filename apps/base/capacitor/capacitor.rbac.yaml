---
# Pod identity. Has no direct cluster permissions; only the impersonator
# ClusterRole grants the right to act-as one of the preset SAs below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capacitor-next
  namespace: capacitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capacitor-next-impersonator
rules:
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capacitor-next-impersonator
subjects:
  - kind: ServiceAccount
    name: capacitor-next
    namespace: capacitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capacitor-next-impersonator
---
# ClusterAdmin preset: the SA that capacitor-next impersonates for unauthenticated
# (forward-auth-gated) sessions. Mirrors the upstream rbac-preset-clusteradmin
# manifest, namespaced to `capacitor`. Match the upstream name so the README's
# IMPERSONATE_SA_RULES syntax stays familiar.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capacitor-next-preset-clusteradmin
  namespace: capacitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: capacitor-next-preset-clusteradmin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: capacitor-next-preset-clusteradmin
subjects:
  - kind: ServiceAccount
    name: capacitor-next-preset-clusteradmin
    namespace: capacitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: capacitor-next-preset-clusteradmin
