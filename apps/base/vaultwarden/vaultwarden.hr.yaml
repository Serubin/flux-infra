apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: vaultwarden
      version: 0.38.0
      sourceRef:
        kind: HelmRepository
        name: vaultwarden-charts
        namespace: default
  values:
    image:
      registry: docker.io
      repository: vaultwarden/server
      tag: "1.36.0-alpine"
    signupsAllowed: false
    ingress:
      enabled: true
      class: ""
    storage:
      # Chart 0.36.4 moved persistence under `storage.*`. The original chart-
      # managed PVC has `helm.sh/resource-policy: keep`, so it survived the
      # upgrade — reuse it via existingVolumeClaim rather than letting the
      # chart create a fresh empty PVC.
      existingVolumeClaim:
        claimName: vaultwarden-data-vaultwarden-0
        dataPath: /data
    smtp:
      enabled: true
      host: "smtp.gmail.com"
      port: 465
      security: "force_tls"
