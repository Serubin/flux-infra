apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nocodb-postgresql-cnpg
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: cluster
      version: 0.6.1
      sourceRef:
        kind: HelmRepository
        name: cloudnativepg-charts
        namespace: default
      interval: 5m
  values:
    name: nocodb-postgresql-cnpg
    cluster:
      instances: 1
      storage:
        size: 4Gi
        storageClass: longhorn
      monitoring:
        enabled: true
        podMonitor:
          enabled: true
        prometheusRule:
          # cluster chart 0.6.0 ships two rules whose PromQL applies a range
          # selector to an aggregated instant vector (invalid syntax), causing
          # the prometheus-operator admission webhook to reject the whole rule
          # group. Remove once upstream fixes the expressions.
          excludeRules:
            - CNPGClusterLogicalReplicationErrors
            - CNPGClusterLogicalReplicationErrorsCritical
            - CNPGClusterLogicalReplicationStopped
            - CNPGClusterLogicalReplicationStoppedCritical
      initdb:
        database: nocodb
        owner: nocodb
