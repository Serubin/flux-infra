---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: alloy
      version: 1.10.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: default
      interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      create: false
    controller:
      type: daemonset
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
    alloy:
      mounts:
        varlog: true
      configMap:
        create: true
        content: |
          logging {
            level  = "info"
            format = "logfmt"
          }

          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              target_label  = "__path__"
              replacement   = "/var/log/pods/*$1/*.log"
            }
            rule {
              action        = "replace"
              source_labels = ["__meta_kubernetes_pod_container_id"]
              regex         = "^(\\w+):\\/\\/.+$"
              replacement   = "$1"
              target_label  = "tmp_container_runtime"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.process.pod_logs.receiver]
          }

          loki.process "pod_logs" {
            stage.match {
              selector = "{tmp_container_runtime=\"containerd\"} |~ \"^[^ ]+ stderr|stdout [^ ]\""

              stage.regex {
                expression = "^(?P<timestamp>\\S+?) (?P<stream>stdout|stderr) (?P<flags>\\S+?) (?P<content>.*)$"
              }
              stage.labels {
                values = {
                  stream = "stream",
                }
              }
              stage.output {
                source = "content"
              }
            }

            // ajd-site emits structured JSON logs; promote `level` to a label
            // so it can be filtered without a query-time `| json`. Scoped by
            // selector so the JSON parser only runs on this app's lines.
            stage.match {
              selector = "{app=\"ajd-site\"}"

              stage.json {
                expressions = {
                  level = "level",
                }
              }
              stage.labels {
                values = {
                  level = "level",
                }
              }
            }

            stage.label_drop {
              values = ["tmp_container_runtime"]
            }

            forward_to = [loki.write.default.receiver]
          }

          loki.write "default" {
            endpoint {
              url = "http://loki.default.svc.cluster.local:3100/loki/api/v1/push"
            }
          }
