---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: default
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.default.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000
